{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{{ profile.name }} | Portfolio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Splide -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/css/splide.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        /* Premium Dark Theme - Matching home.html */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark-bg: #0f0f1f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-light: #ffffff;
            --text-gray: #a0aec0;
        }
        
        body {
            background: var(--dark-bg);
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            color: var(--text-light);
        }
        
        /* Premium Navbar */
        .custom-nav {
            background: rgba(15, 15, 31, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .custom-nav.scrolled {
            padding: 10px 0;
            background: rgba(15, 15, 31, 0.98);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .navbar-brand {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .navbar-brand:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Toggle Button - Visible and Styled */
        .navbar-toggler {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .navbar-toggler:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .navbar-toggler:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.5);
            outline: none;
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 1)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        
        /* Navbar Links */
        .navbar-nav {
            gap: 8px;
        }
        
        .nav-link {
            color: var(--text-gray) !important;
            font-weight: 500;
            font-size: 16px;
            padding: 10px 20px !important;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            letter-spacing: 0.5px;
        }
        
        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 80%;
            height: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: transform 0.3s ease;
            border-radius: 2px;
        }
        
        .nav-link:hover::before {
            transform: translateX(-50%) scaleX(1);
        }
        
        .nav-link:hover {
            color: white !important;
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        
        .nav-link.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            color: white !important;
        }
        
        .nav-link.active::before {
            transform: translateX(-50%) scaleX(1);
        }
        
        /* Main Content */
        .main-content {
            min-height: calc(100vh - 200px);
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Premium Footer */
        .footer {
            background: rgba(15, 15, 31, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px 0;
            margin-top: 60px;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .footer-content {
            text-align: center;
        }
        
        .footer-text {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .footer-text a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-text a:hover {
            color: #f093fb;
        }
        
        .footer-social {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        
        .footer-social a {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            color: #667eea;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .footer-social a:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-5px);
        }
        
        .heart {
            color: #f5576c;
            animation: heartbeat 1.5s ease infinite;
            display: inline-block;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        
        /* Mobile Menu Animation */
        @media (max-width: 992px) {
            .navbar-collapse {
                background: rgba(15, 15, 31, 0.98);
                backdrop-filter: blur(20px);
                border-radius: 20px;
                margin-top: 15px;
                padding: 20px;
                border: 1px solid rgba(102, 126, 234, 0.2);
                animation: slideDown 0.3s ease-out;
            }
            
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            .nav-link {
                text-align: center;
                padding: 12px !important;
            }
            
            .nav-link::before {
                bottom: 0;
            }
            
            .navbar-brand {
                font-size: 24px;
            }
        }
        
        /* Loading Animation */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .custom-nav {
                padding: 12px 0;
            }
            
            .navbar-brand {
                font-size: 22px;
            }
            
            .footer {
                padding: 30px 0;
            }
            
            .footer-text {
                font-size: 12px;
            }
        }
        
        @media (max-width: 480px) {
            .navbar-brand {
                font-size: 20px;
            }
            
            .navbar-toggler {
                padding: 8px;
            }
        }
    </style>
</head>
<body>

<!-- Loading Spinner -->
<div class="loading" id="loading">
    <div class="loading-spinner"></div>
</div>

<!-- Premium Navbar -->
<nav class="navbar navbar-expand-lg custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-code"></i> {{ profile.name }}
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle navigation menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto text-center">
                <li class="nav-item">
                    <a href="/" class="nav-link">
                        <i class="fas fa-home"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/about/" class="nav-link">
                        <i class="fas fa-user"></i> About
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/projects/" class="nav-link">
                        <i class="fas fa-code-branch"></i> Projects
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/blog/" class="nav-link">
                        <i class="fas fa-blog"></i> Blog
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/contact/" class="nav-link">
                        <i class="fas fa-envelope"></i> Contact
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="main-content">
    {% block content %}{% endblock %}
</main>

<!-- Premium Footer -->
<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-text">
                &copy; 2024 {{ profile.name }}. All rights reserved.
            </div>
            <div class="footer-text">
                Built with <span class="heart">❤️</span> using Django | 
                <a href="https://github.com" target="_blank">Open Source</a>
            </div>
            <div class="footer-social">
                {% for social in social_links %}
                <a href="{{ social.link }}" target="_blank" aria-label="Social link">
                    <i class="{{ social.icon }}"></i>
                </a>
                {% endfor %}
            </div>
        </div>
    </div>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/js/splide.min.js"></script>

<script>
    // Hide loading spinner when page loads
    window.addEventListener('load', function() {
        const loading = document.getElementById('loading');
        if (loading) {
            setTimeout(function() {
                loading.style.opacity = '0';
                setTimeout(function() {
                    loading.style.display = 'none';
                }, 500);
            }, 500);
        }
        
        // Initialize AOS with mobile support
        if (typeof AOS !== 'undefined') {
            AOS.init({
                duration: 800,
                once: true,
                offset: 50,
                disable: false,
                startEvent: 'DOMContentLoaded',
                initClassName: 'aos-init',
                animatedClassName: 'aos-animate',
                useClassNames: false,
                disableMutationObserver: false,
                debounceDelay: 50,
                throttleDelay: 99,
                mirror: false,
                anchorPlacement: 'top-bottom'
            });
            
            // Refresh AOS after all content loads
            setTimeout(function() {
                AOS.refresh();
            }, 100);
        }
        
        // Navbar scroll effect
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.custom-nav');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
        
        // Add active class to current nav link
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => {
            const linkPath = link.getAttribute('href');
            if (currentPath === linkPath || (currentPath === '/' && linkPath === '/')) {
                link.classList.add('active');
            }
        });
        
        // Close mobile menu after clicking a link
        const navCollapse = document.querySelector('.navbar-collapse');
        const navItems = document.querySelectorAll('.nav-link');
        
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                if (window.innerWidth < 992) {
                    const bsCollapse = bootstrap.Collapse.getInstance(navCollapse);
                    if (bsCollapse) {
                        bsCollapse.hide();
                    }
                }
            });
        });
    });
    
    // Refresh AOS on window resize for mobile
    window.addEventListener('resize', function() {
        if (typeof AOS !== 'undefined') {
            AOS.refresh();
        }
    });
</script>
</body>
</html>
